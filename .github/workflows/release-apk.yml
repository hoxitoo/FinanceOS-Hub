name: Release APK

# Builds a signed debug APK on every push to main and publishes it as a GitHub Release,
# so the in-app «Проверить обновления» feature can find and install it. The APK is signed
# with the repo-committed shared debug keystore, so every release shares one signature and
# updates install over each other without a signature-mismatch error.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases and upload assets

concurrency:
  group: release-apk
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Compute version
        id: ver
        run: |
          echo "tag=v0.1.0.${{ github.run_number }}"  >> "$GITHUB_OUTPUT"
          echo "name=0.1.0.${{ github.run_number }}"  >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        env:
          # Feeds app/build.gradle.kts → versionCode / versionName, and thus the tag the
          # in-app updater compares against.
          FOS_BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk "dist/FinanceOS-Hub-${{ steps.ver.outputs.tag }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: FinanceOS Hub ${{ steps.ver.outputs.tag }}
          make_latest: true
          body: |
            Автоматическая сборка из `main`.

            **Версия:** ${{ steps.ver.outputs.name }}
            **Тип:** debug APK (подписан общим debug-ключом)

            ### Установка
            1. Скачайте `FinanceOS-Hub-${{ steps.ver.outputs.tag }}.apk` ниже.
            2. Откройте файл на Android-устройстве и разрешите установку из этого источника.

            Уже установленное приложение обновится само через
            **Настройки → Обновления → Проверить обновления**.
          files: dist/*.apk
